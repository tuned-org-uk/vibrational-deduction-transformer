# Wiring Autoencoder -- default hyperparameters (v2 model API)
# For Apple Silicon (MPS) use configs/mps.yaml which overrides memory levers.
#
# Changes from the stale v1 config (issue #62):
#   - Replaced stale v1 model keys (n_wiring_heads, beta, alpha,
#     use_lambda_features) with the v2 keys (q, lam_s, tau, n_layers,
#     n_heads, dropout) that WiringAutoencoder.from_config() actually reads.
#   - Added density_loss_weight under training: placeholder for the
#     vdeductive/density.py wiring work (issue #62, point 3).
#
# Stability mitigations (issue #68):
#   - Added a_min, q_min, nu under training: to configure the two
#     mode-weight collapse mitigations described in Section 5.2.
#
# MassMatrix singularity fix (issue #74):
#   - Added mass_clip under model: so from_config() can forward it to
#     MassMatrix and suppress the spurious lambda=1 singularity warning
#     on normalised Laplacians.  See docs/04-stability.md S7.
#
# Option D -- mode-entropy ceiling (issue #82):
#   - Added nu_entropy under training: to configure the entropy ceiling
#     penalty weight.  Set to 0.0 to disable.  See docs/04-stability.md
#     and the WiringAutoencoder docstring for the penalty formula.
#   NOTE: q must be >= 6 for the entropy ceiling to have a non-zero
#   gradient at the uniform attractor.  With q=2 the fixed point
#   pi=[0.5,0.5] has zero gradient; nu_entropy has no effect.
#
# ELBO normalisation (issue #89, Fix B):
#   - Added normalise_elbo_by_nodes under training:.  When true (default),
#     forward() divides the raw recon_loss() output by N (the graph node
#     count) so that all four ELBO terms share the same per-node scale.
#     Without this normalisation the reconstruction term is O(N) times
#     larger than the KL terms, suppressing the KL gradient and causing
#     kl_S and kl_tau to collapse silently to zero.  Set to false to
#     recover the pre-fix behaviour for ablation studies only.
#
# KL free-bits floor (issue #89, Fix A):
#   - Added free_bits_z, free_bits_s, free_bits_tau under training:.
#     Each KL term is clamped from below after per-dimension aggregation
#     and before the ELBO sum, preventing the spectral or isotropic prior
#     from being silently zeroed out by the reconstruction gradient.
#     When a KL term is below its floor the gradient of that term is zero
#     (standard torch.clamp behaviour); the posterior is free to match the
#     prior on those dimensions.  Set all three to 0.0 for ablation only.

model:
  version: 2              # canonical v2 path in from_config()
  latent_dim: 32          # dim(z) -- VAE reparameterisation space
  hidden_dim: 256         # encoder / decoder hidden channel width
  q: 16                   # number of spectral modes (SpectralLoadingDecoder + KL priors)
                          # NOTE: minimum effective q for Option D is 6.
                          # Below that the pi=[0.5,...] fixed point has zero gradient.
  tau_modes: 16           # eigenvectors kept in TauModeDiffusion (== q is recommended)
  lam_s: 0.1              # weight for kl_S (spectral basis KL term)
  tau: 0.5                # diffusion time scale for kl_tau (mode frequency KL term)
  n_layers: 4             # VDT blocks inside WiringEncoder
  n_heads: 4              # attention heads per VDT block
  dropout: 0.1            # dropout probability inside WiringEncoder
  eps: 0.5
  mass_clip: 1000.0       # clamp MassMatrix M_diag at lambda=1 singularity (issue #74)
                          # prevents spurious conditioning warning on normalised Laplacians.
                          # Use 1e4 for sparse graphs; 1e3 is recommended for Cora/k-NN.

graph:
  knn_k: 35               # base kNN graph degree
  sigma: 1.2              # RBF kernel bandwidth
  normalised: true        # use normalised Laplacian
  sparse: true            # use sparse COO Laplacian -- avoids materialising (B,N,N) on MPS

training:
  epochs: 200
  batch_size: 32          # 32 keeps peak L(z) buffer ~0.9 GB on Cora
  mps_batch_size: 16      # overrides batch_size when device=mps (set automatically in train.py)
  lr: 3.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine       # cosine | step | none
  warmup_epochs: 10
  grad_clip: 1.0
  seed: 42
  device: auto            # auto | cpu | cuda | mps
  density_loss_weight: 1.0  # weight for density-matrix loss from vdeductive/density.py (issue #62)
  # -- Stability mitigations (issue #68) ------------------------------------
  a_min: 0.1   # floor for Gamma shape a = exp(log_a) in tau_mode_kl;
               # prevents full shape collapse.  Set to 0.0 to disable.
  q_min: 4     # minimum number of active spectral modes required;
               # active_mode_penalty fires when N_active < q_min.
               # Set to 0 to disable the penalty entirely.
  nu: 1.0      # Lagrange weight for the active-mode penalty term;
               # added to total ELBO loss.  Set to 0.0 to disable.
  # -- Option D -- mode-entropy ceiling (issue #82) -------------------------
  nu_entropy: 0.5  # weight for mode-entropy ceiling penalty;
                   # penalises HIGH Shannon entropy H = -sum pi_k log pi_k
                   # across the softmax mode-weight proxy pi_k.
                   # Set to 0.0 to disable.  Logged as 'entropy_S'.
                   # Effective only when q >= 6 (see comment above).
  # -- ELBO normalisation (issue #89, Fix B) --------------------------------
  normalise_elbo_by_nodes: true  # divide recon_loss() by N before summing ELBO;
                                  # brings reconstruction onto the same per-node
                                  # scale as kl_z / kl_S / kl_tau so the KL
                                  # gradient is not suppressed by a factor of N.
                                  # Set to false for ablation only.
  # -- KL free-bits floors (issue #89, Fix A) --------------------------------
  free_bits_z:   0.5  # nats floor for kl_z (isotropic VAE KL);
                      # kl_z = kl_z.clamp(min=free_bits_z) before ELBO sum.
                      # Prevents the isotropic posterior from collapsing to
                      # the prior while recon dominates.  Set to 0.0 to disable.
  free_bits_s:   0.5  # nats floor for kl_S (spectral basis KL);
                      # kl_S = kl_S.clamp(min=free_bits_s) before ELBO sum.
                      # Critical for preventing kl_S -> 0 collapse observed
                      # in Cora runs 1 and 2 (see issue #89).  Set to 0.0 to
                      # disable (not recommended).
  free_bits_tau: 0.1  # nats floor for kl_tau (mode-frequency KL);
                      # kl_tau = kl_tau.clamp(min=free_bits_tau) before ELBO sum.
                      # Smaller default than free_bits_s because the Gamma prior
                      # range for kl_tau is narrower.  Set to 0.0 to disable.
  dt_init: 0.005

dataset:
  name: cora              # cora | pubmed | mnist | custom
  root: ./data
  split: [0.8, 0.1, 0.1]

logging:
  save_every_n_epochs: 10
  use_wandb: false
  project: wiring-autoencoder
  log_every: 1           # epochs
  save_dir: ./checkpoints
