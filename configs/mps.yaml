# Wiring Autoencoder -- Apple Silicon MPS research baseline
#
# Merges v2 model API (default.yaml) with MPS memory levers.
# Uses the smallest model that still exercises all vibrational
# components: VDT blocks, SpectralLoadingDecoder, MassMatrix,
# DifferentiableLaplacian, density-matrix loss.
#
# Peak memory estimate on Cora (N=2708, batch=4, q=8):
#   L(z) sparse COO   : 4 x 40620 x 4   ~  0.6 MB
#   eigvecs (q=8)     : 4 x 2708 x 8    ~  0.3 MB
#   MHA activations   : 4 x 2708 x 64   ~  2.8 MB (manageable)
#   model params      : latent=16,hid=64 ~  8 MB
#   Total peak        : << 1 GB
#
# Diagnostic reference: run-5 training_log.csv (50 epochs, Cora).
# Root cause of uniform-mode attractor:
#   q=2 gives a 2-element simplex; pi=[0.5,0.5] is a fixed point with
#   zero gradient for both entropy ceiling and active-mode floor.
#   Increasing q to 8 breaks the symmetry; nu_entropy=2.0 and lam_s=1.0
#   provide sufficient gradient signal to drive mode selection.
#
# ELBO normalisation (issue #89, Fix B):
#   - Added normalise_elbo_by_nodes under training:.  When true (default),
#     forward() divides the raw recon_loss() output by N (the graph node
#     count) so that all four ELBO terms share the same per-node scale.
#     Without this normalisation the reconstruction term is O(N) times
#     larger than the KL terms, suppressing the KL gradient and causing
#     kl_S and kl_tau to collapse silently to zero.  Set to false to
#     recover the pre-fix behaviour for ablation studies only.
#
# KL free-bits floor (issue #89, Fix A):
#   - Added free_bits_z, free_bits_s, free_bits_tau under training:.
#     Each KL term is clamped from below after per-dimension aggregation
#     and before the ELBO sum, preventing the spectral or isotropic prior
#     from being silently zeroed out by the reconstruction gradient.
#     When a KL term is below its floor the gradient of that term is zero
#     (standard torch.clamp behaviour); the posterior is free to match the
#     prior on those dimensions.  Set all three to 0.0 for ablation only.
#
# Usage:
#   python train.py --config configs/mps.yaml

model:                    # taken from default.yml
  version: 2              # use canonical v2 from_config() path
  latent_dim: 16          # reduced from 32 -- enough for Cora 7-class
  hidden_dim: 256         # encoder / decoder hidden channel width
  q: 16                   # number of spectral modes (SpectralLoadingDecoder + KL priors)
                          # NOTE: minimum effective q for Option D is 6.
                          # Below that the pi=[0.5,...] fixed point has zero gradient.
  tau_modes: 16           # eigenvectors kept in TauModeDiffusion (== q is recommended)
  lam_s: 1.0              # spectral basis KL weight; increased from 0.4 to hold kl_S > 0
  tau: 1.0                # diffusion time scale; increased from 0.5 to resist kl_tau collapse
  n_layers: 4             # VDT blocks -- reduced from 4; exercises stack without OOM
  n_heads: 4              # attention heads -- matches small hidden_dim
  dropout: 0.2            # unchanged
  eps: 0.3                # find a good value to create a proper network from the inputs
  mass_clip: 99.0         # suppress lambda=1 MassMatrix singularity (issue #74)
  kl_z_warmup: 10

graph:
  knn_k: 35               # slightly larger than mps.yaml's 10 -- reduces disconnection risk
  sigma: 1.2              # match default.yaml (mps.yaml had 0.5 -- too narrow for Cora)
  normalised: true
  sparse: true            # lever 1: never materialise (B, N, N)

training:
  epochs: 100             # extended from 50; mode selection now has room to occur
  batch_size: 4           # lever 2: minimal safe batch for reduced model on MPS
  mps_batch_size: 4       # explicit override
  lr: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 10
  grad_clip: 1.0
  seed: 42
  device: auto
  density_loss_weight: 1.0
  a_min: 0.1              # prevent mode-weight collapse
  q_min: 4                # minimum active modes; increased from 2 to force half of q=8 active
  nu: 1.0                 # active-mode penalty weight; increased from 0.3
  nu_entropy: 2.0         # mode-entropy ceiling weight (Option D, issue #82);
                          # set to 0.0 to disable.  2.0 chosen to dominate recon scale
                          # at the pi=[0.5,0.5] fixed point (~log(2)*2 ~ 1.4 nats).
  dt_init: 0.001          # conservative CFL-safe value (well below dynamic bound ~0.012)
  # -- ELBO normalisation (issue #89, Fix B) --------------------------------
  normalise_elbo_by_nodes: true  # divide recon_loss() by N before summing ELBO;
                                  # brings reconstruction onto the same per-node
                                  # scale as kl_z / kl_S / kl_tau so the KL
                                  # gradient is not suppressed by a factor of N.
                                  # Set to false for ablation only.
  # -- KL free-bits floors (issue #89, Fix A) --------------------------------
  free_bits_z:   0.5  # nats floor for kl_z (isotropic VAE KL);
                      # kl_z = kl_z.clamp(min=free_bits_z) before ELBO sum.
                      # Prevents the isotropic posterior from collapsing to
                      # the prior while recon dominates.  Set to 0.0 to disable.
  free_bits_s:   0.5  # nats floor for kl_S (spectral basis KL);
                      # kl_S = kl_S.clamp(min=free_bits_s) before ELBO sum.
                      # Critical for preventing kl_S -> 0 collapse observed
                      # in Cora runs 1 and 2 (see issue #89).  Set to 0.0 to
                      # disable (not recommended).
  free_bits_tau: 0.1  # nats floor for kl_tau (mode-frequency KL);
                      # kl_tau = kl_tau.clamp(min=free_bits_tau) before ELBO sum.
                      # Smaller default than free_bits_s because the Gamma prior
                      # range for kl_tau is narrower.  Set to 0.0 to disable.

dataset:
  name: cora
  root: ./data
  split: [0.8, 0.1, 0.1]

logging:
  save_every_n_epochs: 10
  use_wandb: false
  project: wiring-autoencoder
  log_every: 1
  save_dir: ./checkpoints
